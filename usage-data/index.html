<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GovSpend ┬╖ Usage Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#0076DE; --blue-d:#0060b5; --space:#303650;
  --xanth:#FFC44D; --bg:#F5F6F8; --card:#FFFFFF; --line:#E4E7EC; --line-2:#EEF0F4;
  --ink:#303650; --muted:#71788A; --good:#1f9d6b; --bad:#d8543f;
  --shadow:0 1px 2px rgba(48,54,80,.06),0 4px 18px rgba(48,54,80,.05);
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:Lato,system-ui,Arial,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:1320px;margin:0 auto;padding:0 22px 60px}
header.top{background:var(--space);color:#fff}
.top-in{max-width:1320px;margin:0 auto;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px}
.logo{width:30px;height:30px;border-radius:7px;background:var(--blue);position:relative;flex:0 0 auto}
.logo:after{content:"";position:absolute;inset:8px;border-radius:3px;background:var(--xanth)}
.brand h1{font-size:15px;font-weight:900;letter-spacing:.16em;text-transform:uppercase;margin:0;line-height:1}
.brand .sub{font-size:11px;color:#aab1c4;letter-spacing:.18em;text-transform:uppercase;margin-top:4px}
.stamp{font-size:11.5px;color:#aab1c4;text-align:right;line-height:1.5}
.stamp b{color:#fff;font-weight:700}
.controls{position:sticky;top:0;z-index:30;background:rgba(245,246,248,.92);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);margin-bottom:22px}
.controls-in{max-width:1320px;margin:0 auto;padding:13px 22px;display:flex;gap:18px;align-items:flex-end;flex-wrap:wrap}
.ctl{display:flex;flex-direction:column;gap:5px}
.ctl label{font-size:10.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);font-weight:700}
select{appearance:none;border:1px solid var(--line);background:#fff url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6'><path d='M0 0l5 6 5-6z' fill='%2371788A'/></svg>") no-repeat right 12px center;padding:9px 34px 9px 12px;border-radius:9px;font:inherit;font-size:14px;font-weight:700;color:var(--space);min-width:240px;cursor:pointer}
.seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{border:0;background:transparent;padding:9px 14px;font:inherit;font-size:13px;font-weight:700;color:var(--muted);cursor:pointer;border-right:1px solid var(--line-2)}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--blue);color:#fff}
.toggle{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--space);cursor:pointer;user-select:none;padding-bottom:9px}
.toggle input{display:none}
.tg{width:38px;height:21px;border-radius:11px;background:#cdd2dc;position:relative;transition:.15s}
.tg:after{content:"";position:absolute;top:2px;left:2px;width:17px;height:17px;border-radius:50%;background:#fff;transition:.15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
.toggle input:checked + .tg{background:var(--blue)}
.toggle input:checked + .tg:after{left:19px}
.toggle.dis{opacity:.4;pointer-events:none}
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .k-l{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:700}
.kpi .k-v{font-size:30px;font-weight:900;color:var(--space);line-height:1.1;margin-top:7px;font-variant-numeric:tabular-nums}
.kpi .k-s{font-size:12px;color:var(--muted);margin-top:4px}
.kpi.sel{border-color:var(--blue);box-shadow:0 0 0 1px var(--blue),var(--shadow)}
.kpi.sel:before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--blue)}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
.card h2{font-size:13px;letter-spacing:.04em;font-weight:900;color:var(--space);margin:0;padding:16px 18px 0;display:flex;align-items:center;justify-content:space-between}
.card h2 .hint{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0}
.card .body{padding:14px 18px 18px}
.chart-box{height:320px;position:relative}
.mix-row{display:flex;align-items:center;gap:10px;margin:11px 0}
.mix-row .lab{width:92px;font-size:12.5px;font-weight:700;color:var(--space);flex:0 0 auto}
.mix-bar{flex:1;height:18px;background:var(--line-2);border-radius:6px;overflow:hidden}
.mix-bar i{display:block;height:100%;border-radius:6px}
.mix-row .val{width:58px;text-align:right;font-size:12.5px;font-weight:700;color:var(--muted);font-variant-numeric:tabular-nums}
.lb{margin-bottom:18px}
.lb-row{display:grid;grid-template-columns:180px 1fr 96px;align-items:center;gap:12px;padding:7px 0;cursor:pointer;border-bottom:1px solid var(--line-2)}
.lb-row:hover .lb-name{color:var(--blue)}
.lb-name{font-size:13.5px;font-weight:700;color:var(--space);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lb-bar{height:14px;background:var(--line-2);border-radius:5px;overflow:hidden}
.lb-bar i{display:block;height:100%;background:linear-gradient(90deg,var(--blue),#3f9bf0);border-radius:5px}
.lb-val{text-align:right;font-size:13px;font-weight:900;color:var(--space);font-variant-numeric:tabular-nums}
.sec-head{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 18px 6px;flex-wrap:wrap}
.search{border:1px solid var(--line);border-radius:9px;padding:8px 12px;font:inherit;font-size:13.5px;min-width:240px}
.t-scroll{max-height:460px;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead th{position:sticky;top:0;background:#fff;text-align:right;padding:10px 14px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:700;border-bottom:1px solid var(--line);cursor:pointer;white-space:nowrap;z-index:1}
thead th.l{text-align:left}
thead th.sortcol{color:var(--blue)}
tbody td{padding:10px 14px;text-align:right;border-bottom:1px solid var(--line-2);font-variant-numeric:tabular-nums;white-space:nowrap}
tbody td.l{text-align:left}
tbody tr{cursor:pointer}
tbody tr:hover{background:#f3f8fe}
.cust{font-weight:700;color:var(--space)}
.sub2{color:var(--muted);font-size:12px}
.delta{font-weight:700}
.delta.up{color:var(--good)} .delta.dn{color:var(--bad)}
.pill{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:var(--line-2);color:var(--muted)}
.scrim{position:fixed;inset:0;background:rgba(48,54,80,.4);opacity:0;pointer-events:none;transition:.18s;z-index:40}
.scrim.show{opacity:1;pointer-events:auto}
.over{position:fixed;top:0;right:0;bottom:0;width:min(560px,94vw);background:#fff;box-shadow:-10px 0 40px rgba(48,54,80,.2);transform:translateX(100%);transition:.22s;z-index:41;display:flex;flex-direction:column}
.over.show{transform:translateX(0)}
.over-h{padding:20px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.over-h h3{margin:0;font-size:19px;font-weight:900;color:var(--space)}
.over-h .x{border:0;background:var(--line-2);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--muted);flex:0 0 auto}
.over-b{padding:18px 22px;overflow:auto}
.ostat{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:18px}
.ostat div{background:var(--bg);border:1px solid var(--line);border-radius:11px;padding:11px 13px}
.ostat .l{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700}
.ostat .v{font-size:21px;font-weight:900;color:var(--space);margin-top:3px;font-variant-numeric:tabular-nums}
.note{font-size:12px;color:var(--muted);background:#fffaf0;border:1px solid #f6e6c0;border-radius:10px;padding:10px 12px;margin:0 0 16px}
.sortbar{display:flex;align-items:center;gap:7px}.sortlab{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);font-weight:700}.sortsel{appearance:none;border:1px solid var(--line);background:#fff;padding:6px 10px;border-radius:8px;font:inherit;font-size:12.5px;font-weight:700;color:var(--space);cursor:pointer}.dirbtn{border:1px solid var(--line);background:#fff;padding:6px 12px;border-radius:8px;font:inherit;font-size:12.5px;font-weight:700;color:var(--blue);cursor:pointer;white-space:nowrap}.dirbtn:hover{background:#f3f8fe}.sec-head .right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.loadmore{border:1px solid var(--line);background:#fff;color:var(--blue);font:inherit;font-weight:700;font-size:13px;padding:8px 18px;border-radius:9px;cursor:pointer}.loadmore:hover{background:#f3f8fe;border-color:var(--blue)}
.foot{margin-top:26px;font-size:12px;color:var(--muted);line-height:1.7;border-top:1px solid var(--line);padding-top:16px}
.foot b{color:var(--space)}
@media(max-width:900px){.grid{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header class="top">
  <div class="top-in">
    <div class="brand">
      <div class="logo"></div>
      <div><h1>GovSpend</h1><div class="sub">Usage Intelligence</div></div>
    </div>
    <div class="stamp" id="stamp"></div>
  </div>
</header>

<div class="controls">
  <div class="controls-in">
    <div class="ctl">
      <label>View / Account Owner</label>
      <select id="ownerSel"></select>
    </div>
    <div class="ctl">
      <label>Time frame</label>
      <div class="seg" id="tfSeg">
        <button data-tf="7">7d</button><button data-tf="30" class="on">30d</button><button data-tf="90">90d</button>
      </div>
    </div>
    <div class="ctl">
      <label>Module</label>
      <div class="seg" id="modSeg">
        <button data-mod="core" class="on">Core / Platform</button><button data-mod="ai">AI</button><button data-mod="opp">Opportunities</button>
      </div>
    </div>
    <label class="toggle" id="trialWrap"><input type="checkbox" id="trialChk"><span class="tg"></span>Include trials</label>
  </div>
</div>

<div class="wrap">
  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="card">
      <h2><span id="trendTitle">Usage trend</span><span class="hint" id="trendHint"></span></h2>
      <div class="body"><div class="chart-box"><canvas id="trend"></canvas></div></div>
    </div>
    <div class="card">
      <h2>Module mix<span class="hint">30-day rolling ┬╖ org-level</span></h2>
      <div class="body" id="mix"></div>
    </div>
  </div>

  <div class="card lb" id="lbCard">
    <h2>Owner leaderboard<span class="hint">90-day Core ┬╖ click to focus a book</span></h2>
    <div class="body" id="lb"></div>
  </div>

  <div class="card" style="margin-bottom:18px">
    <div class="sec-head">
      <h2 style="padding:0">Organizations <span class="pill" id="orgCountPill"></span></h2>
      <div class="right"><div class="sortbar" id="orgSortBar"></div><input class="search" id="orgSearch" placeholder="Search organizationsтАж"></div>
    </div>
    <div class="t-scroll">
      <table id="orgTable">
        <thead><tr>
          <th class="l" data-k="c">Organization</th>
          <th class="l" data-k="o">Owner</th>
          <th data-k="acv">ACV</th>
          <th data-k="core">Core 90d</th>
          <th data-k="ai">AI 90d</th>
          <th data-k="opp">Opp 90d</th>
          <th data-k="cd">Core MoM</th>
          <th data-k="nu">Users</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="sec-head">
      <h2 style="padding:0">Users <span class="pill" id="userCountPill"></span></h2>
      <div class="right"><div class="sortbar" id="userSortBar"></div><input class="search" id="userSearch" placeholder="Search users by name, email, orgтАж"></div>
    </div>
    <div class="t-scroll">
      <table id="userTable">
        <thead><tr>
          <th class="l" data-k="n">User</th>
          <th class="l" data-k="c">Organization</th>
          <th class="l" data-k="o">Owner</th>
          <th data-k="core">Core 90d</th>
          <th data-k="ai">AI 90d</th>
          <th data-k="opp">Opp 90d</th>
        </tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<div class="scrim" id="scrim"></div>
<div class="over" id="over">
  <div class="over-h"><h3 id="ovName"></h3><button class="x" id="ovX">тЬХ</button></div>
  <div class="over-b" id="ovBody"></div>
</div>

<script>
/*__DATA__*/
</script>
<script src="usage_data.js"></script>
<script>
const D = window.GS_DATA;
const fmt = n => Math.round(n||0).toLocaleString();
const MODS = ['core','ai','opp'];
const MOD = {
  core:{label:'Core',full:'Core / Platform',color:'#0076DE',ow:'c',pay:'cp',tri:'ct'},
  ai:{label:'AI',full:'AI',color:'#7a4ddb',ow:'a',pay:'ap',tri:'at'},
  opp:{label:'Opp',full:'Opportunities',color:'#e0913a',ow:'p',pay:'op',tri:'ot'}
};
const W = D.weeks.length;
const PAGE = 150;
const state = {owner:'ALL', tf:30, mods:['core'], trial:false, ovOrg:null,
  orgSort:{key:'d:core', dir:-1}, userSort:{key:'d:core', dir:-1}};
let orgShow=PAGE, userShow=PAGE, trendChart=null;

// ---- build per-entity weekly arrays (aligned to D.weeks) ----
function blank(){return {core:new Float64Array(W), ai:new Float64Array(W), opp:new Float64Array(W)};}
const orgW = D.orgs.map(blank), userW = D.users.map(blank);
(D.orgWeekly||[]).forEach(([oi,wi,c,a,p])=>{const x=orgW[oi]; if(x){x.core[wi]+=c; x.ai[wi]+=a; x.opp[wi]+=p;}});
(D.userWeekly||[]).forEach(([ui,wi,c,a,p])=>{const x=userW[ui]; if(x){x.core[wi]+=c; x.ai[wi]+=a; x.opp[wi]+=p;}});
const ownerW = {};
D.owners.forEach(o=>ownerW[o]=blank());
(D.ownerWeekly||[]).forEach(r=>{const x=ownerW[r.o]; if(x){const wi=D.weeks.indexOf(r.w); if(wi>=0){x.core[wi]+=r.c;x.ai[wi]+=r.a;x.opp[wi]+=r.p;}}});

function tfWeeks(){return state.tf>=90 ? W : (state.tf===30 ? Math.min(4,W) : 1);}
function windows(){const n=tfWeeks(); const cur=[],prev=[];
  for(let i=W-n;i<W;i++) if(i>=0) cur.push(i);
  for(let i=W-2*n;i<W-n;i++) if(i>=0) prev.push(i);
  return {cur,prev};}
// Comparison windows for "movement" (╬Ф hits). For 7d/30d this is the current window vs the
// equal-length window immediately before it. For 90d there is no prior 90-day window in the
// data, so we compare the recent half of the window against the earlier half.
function deltaWindows(){const n=tfWeeks(); const curD=[],prevD=[];
  if(W-2*n>=0){ for(let i=W-n;i<W;i++) curD.push(i); for(let i=W-2*n;i<W-n;i++) prevD.push(i); }
  else { const half=Math.max(1,Math.floor(W/2)); for(let i=0;i<half;i++) prevD.push(i); for(let i=W-half;i<W;i++) curD.push(i); }
  return {curD,prevD};}
function sumW(arr,idxs){let s=0; for(const i of idxs) s+=arr[i]||0; return s;}

// metrics cache keyed by tf
let metCache={};
function metrics(){
  const k=state.tf; if(metCache[k]) return metCache[k];
  const {cur}=windows(); const {curD,prevD}=deltaWindows();
  const mk=(WArr)=>WArr.map(x=>{const m={};
    for(const mod of MODS){m[mod]=sumW(x[mod],cur); m['d'+mod]=sumW(x[mod],curD)-sumW(x[mod],prevD);}
    return m;});
  const r={org:mk(orgW), user:mk(userW)};
  metCache[k]=r; return r;}

// ---- controls ----
document.getElementById('stamp').innerHTML =
  'Data window <b>'+new Date(D.meta.minDay).toLocaleDateString()+' тАУ '+new Date(D.meta.maxDay).toLocaleDateString()+
  '</b><br>Generated '+D.meta.generatedAt+(D.meta.source?'<br><span style="color:#FFC44D">'+D.meta.source+'</span>':'');
const ownerSel=document.getElementById('ownerSel');
ownerSel.innerHTML='<option value="ALL">Executive ┬╖ All owners</option>'+
  D.owners.map(o=>'<option value="'+o.replace(/"/g,'&quot;')+'">'+o+'</option>').join('');
ownerSel.onchange=e=>{state.owner=e.target.value; state.ovOrg=null; orgShow=PAGE; userShow=PAGE; render();};
document.querySelectorAll('#tfSeg button').forEach(b=>b.onclick=()=>{state.tf=+b.dataset.tf;segOn('tfSeg',b);orgShow=PAGE;userShow=PAGE;render();});
// module multi-select
document.querySelectorAll('#modSeg button').forEach(b=>b.onclick=()=>{
  const m=b.dataset.mod, i=state.mods.indexOf(m);
  if(i>=0){ if(state.mods.length>1) state.mods.splice(i,1); } else { state.mods.push(m); }
  state.mods = MODS.filter(x=>state.mods.includes(x)); // keep canonical order
  document.querySelectorAll('#modSeg button').forEach(x=>x.classList.toggle('on', state.mods.includes(x.dataset.mod)));
  // fix sort keys that point at a now-deselected module
  [state.orgSort,state.userSort].forEach(s=>{const ref=s.key.split(':')[1];
    if((s.key.startsWith('m:')||s.key.startsWith('d:')) && !state.mods.includes(ref)) s.key=(s.key[0])+':'+state.mods[0];});
  buildSortUI(); render();
});
document.getElementById('trialChk').onchange=e=>{state.trial=e.target.checked;render();};
function segOn(id,btn){document.querySelectorAll('#'+id+' button').forEach(x=>x.classList.remove('on'));btn.classList.add('on');}

// ---- sort UI (injected into each table's header bar) ----
// Every module is always offered (movement first, then total) for every time frame,
// so the mover ranking is reachable for Core, AI and Opportunities regardless of which
// module tiles are currently active.
function sortOptions(isOrg){
  const opts=[];
  MODS.forEach(m=>{opts.push(['d:'+m, MOD[m].full+' ┬╖ movement (╬Ф hits)']); opts.push(['m:'+m, MOD[m].full+' ┬╖ total hits']);});
  if(isOrg){opts.push(['acv','ACV']); opts.push(['nu','Active users']);}
  opts.push(['name','Name (AтАУZ)']);
  return opts;
}
// Direction button text depends on what is being ranked. For a movement (╬Ф) key it reads
// as the sign of the change; for a total key it reads as high/low volume.
function dirLabel(key,dir){
  if(key==='name') return dir<0?'ZтАУA':'AтАУZ';
  if(key[0]==='d') return dir<0?'тЦ▓ Biggest increase':'тЦ╝ Biggest decrease';
  return dir<0?'тЦ╝ Highest':'тЦ▓ Lowest';
}
// If a ranking targets a module whose column is hidden, reveal that module so the numbers
// being ranked are visible (keeps KPIs / trend / leaderboard in sync too).
function ensureModuleShown(key){
  const parts=key.split(':');
  if((parts[0]==='m'||parts[0]==='d') && MODS.includes(parts[1]) && !state.mods.includes(parts[1])){
    state.mods.push(parts[1]); state.mods=MODS.filter(x=>state.mods.includes(x));
    document.querySelectorAll('#modSeg button').forEach(x=>x.classList.toggle('on', state.mods.includes(x.dataset.mod)));
    return true;
  }
  return false;
}
function buildSortUI(){
  [['orgSortBar',true,state.orgSort],['userSortBar',false,state.userSort]].forEach(([id,isOrg,s])=>{
    const bar=document.getElementById(id); if(!bar) return;
    const opts=sortOptions(isOrg);
    if(!opts.find(o=>o[0]===s.key)) s.key=opts[0][0];
    bar.innerHTML='<span class="sortlab">Rank by</span>'+
      '<select class="sortsel">'+opts.map(o=>'<option value="'+o[0]+'"'+(o[0]===s.key?' selected':'')+'>'+o[1]+'</option>').join('')+'</select>'+
      '<button class="dirbtn">'+dirLabel(s.key,s.dir)+'</button>';
    bar.querySelector('.sortsel').onchange=e=>{s.key=e.target.value; if(s.key==='name')s.dir=1; ensureModuleShown(s.key); buildSortUI(); render();};
    bar.querySelector('.dirbtn').onclick=()=>{s.dir=-s.dir; buildSortUI(); isOrg?renderOrgs():renderUsers();};
  });
}

// ---- KPIs ----
function scopeWindowTotals(){ // core/ai/opp totals for current scope+window
  const {cur}=windows();
  if(state.owner==='ALL'){
    const s=D.portfolio.slice(-(state.tf>=90?D.portfolio.length:state.tf));
    const t={core:0,ai:0,opp:0};
    s.forEach(r=>{t.core+=r.cp+(state.trial?r.ct:0); t.ai+=r.ap+(state.trial?r.at:0); t.opp+=r.op+(state.trial?r.ot:0);});
    return t;
  }
  const x=ownerW[state.owner]||blank();
  return {core:sumW(x.core,cur), ai:sumW(x.ai,cur), opp:sumW(x.opp,cur)};
}
function renderKpis(){
  const t=scopeWindowTotals();
  let acct,acctLab;
  if(state.owner==='ALL'){const s=D.portfolio.slice(-(state.tf>=90?D.portfolio.length:state.tf));
    acct=Math.max(...s.map(r=>r.n)); acctLab='peak active orgs/day';}
  else {acct=D.orgs.filter(o=>o.o===state.owner).length; acctLab='accounts in book';}
  const cards=[['core','Core / Platform',t.core],['ai','AI activity',t.ai],['opp','Opportunities',t.opp],
    ['acct','Accounts',acct]];
  document.getElementById('kpis').innerHTML=cards.map(c=>
    '<div class="kpi'+(c[0]!=='acct'&&state.mods.includes(c[0])?' sel':'')+'">'+
    '<div class="k-l">'+c[1]+'</div><div class="k-v">'+fmt(c[2])+'</div>'+
    '<div class="k-s">'+(c[0]==='acct'?acctLab:('last '+state.tf+' days'))+'</div></div>').join('');
}

// ---- Trend ----
function renderTrend(){
  document.getElementById('trendTitle').textContent=
    (state.owner==='ALL'?'Portfolio':state.owner+' тАФ book')+' ┬╖ '+state.mods.map(m=>MOD[m].label).join(' + ');
  if(typeof Chart==='undefined'){document.getElementById('trendHint').textContent='(trend chart needs an internet connection)';return;}
  let labels, series=[];
  if(state.owner==='ALL'){
    const s=D.portfolio.slice(-(state.tf>=90?D.portfolio.length:state.tf));
    labels=s.map(r=>new Date(r.d).toLocaleDateString(undefined,{month:'short',day:'numeric'}));
    state.mods.forEach(m=>{const v=s.map(r=>r[MOD[m].pay]+(state.trial?r[MOD[m].tri]:0));
      series.push({label:MOD[m].full,data:v,color:MOD[m].color});});
    document.getElementById('trendHint').textContent='daily'+(state.mods.length===1?' ┬╖ 7-day average overlay':'');
  } else {
    const {cur}=windows(); const x=ownerW[state.owner]||blank();
    labels=cur.map(i=>'wk '+new Date(D.weeks[i]).toLocaleDateString(undefined,{month:'short',day:'numeric'}));
    state.mods.forEach(m=>{const v=cur.map(i=>x[m][i]); series.push({label:MOD[m].full,data:v,color:MOD[m].color});});
    document.getElementById('trendHint').textContent='weekly (paying)';
  }
  const ds=series.map(sr=>({label:sr.label,data:sr.data,borderColor:sr.color,backgroundColor:sr.color+'22',
    fill:state.mods.length===1,tension:.32,pointRadius:0,borderWidth:2}));
  if(state.owner==='ALL' && state.mods.length===1){
    const v=ds[0].data, sm=v.map((_,i)=>{const seg=v.slice(Math.max(0,i-6),i+1);return seg.reduce((a,b)=>a+b,0)/seg.length;});
    ds.push({label:'7-day avg',data:sm,borderColor:'#303650',borderDash:[5,4],fill:false,tension:.32,pointRadius:0,borderWidth:2});
  }
  if(trendChart)trendChart.destroy();
  trendChart=new Chart(document.getElementById('trend'),{type:'line',data:{labels,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:ds.length>1,labels:{boxWidth:12,font:{size:11}}},
        tooltip:{callbacks:{label:c=>c.dataset.label+': '+fmt(c.raw)}}},
      scales:{x:{grid:{display:false},ticks:{maxRotation:0,autoSkip:true,maxTicksLimit:10,font:{size:10}}},
        y:{grid:{color:'#EEF0F4'},ticks:{callback:v=>v>=1000?(v/1000)+'k':v,font:{size:10}},beginAtZero:true}}}});
}

// ---- Module mix ----
function renderMix(){
  let f={panel:0,notebook:0,search:0,opp:0,crm:0};
  if(state.owner==='ALL') D.ownerFeature.forEach(r=>{for(const k in f)f[k]+=r[k];});
  else {const r=D.ownerFeature.find(x=>x.o===state.owner); if(r)for(const k in f)f[k]=r[k];}
  const rows=[['AI Panel',f.panel,'#0076DE'],['AI Notebook',f.notebook,'#3f9bf0'],['AI Search',f.search,'#7a4ddb'],
    ['Opportunity',f.opp,'#e0913a'],['CRM',f.crm,'#1f9d6b']];
  const max=Math.max(1,...rows.map(r=>r[1])), tot=rows.reduce((a,b)=>a+b[1],0);
  document.getElementById('mix').innerHTML=rows.map(r=>
    '<div class="mix-row"><div class="lab">'+r[0]+'</div>'+
    '<div class="mix-bar"><i style="width:'+(r[1]/max*100)+'%;background:'+r[2]+'"></i></div>'+
    '<div class="val">'+fmt(r[1])+'</div></div>').join('')+
    '<div class="sub2" style="margin-top:10px">'+(tot?fmt(tot)+' module actions (30d rolling)':'No rolling module activity recorded')+'</div>';
}

// ---- Owner leaderboard (exec only; ranks by combined selected modules over window) ----
function renderLb(){
  const card=document.getElementById('lbCard');
  if(state.owner!=='ALL'){card.style.display='none';return;} card.style.display='';
  const {cur}=windows();
  const tot=D.owners.map(o=>{const x=ownerW[o]; let v=0; state.mods.forEach(m=>v+=sumW(x[m],cur)); return {o,v};})
    .filter(t=>t.v>0).sort((a,b)=>b.v-a.v).slice(0,15);
  const max=Math.max(1,...tot.map(t=>t.v));
  document.querySelector('#lbCard h2 .hint').textContent=state.tf+'-day ┬╖ '+state.mods.map(m=>MOD[m].label).join('+')+' ┬╖ click to focus';
  document.getElementById('lb').innerHTML=tot.map(t=>
    '<div class="lb-row" data-owner="'+t.o.replace(/"/g,'&quot;')+'"><div class="lb-name">'+t.o+'</div>'+
    '<div class="lb-bar"><i style="width:'+(t.v/max*100)+'%"></i></div><div class="lb-val">'+fmt(t.v)+'</div></div>').join('');
  document.querySelectorAll('#lb .lb-row').forEach(r=>r.onclick=()=>{state.owner=r.dataset.owner;ownerSel.value=r.dataset.owner;orgShow=PAGE;userShow=PAGE;render();});
}

// ---- table helpers ----
function deltaCell(v){if(!v) return '<span class="sub2">┬▒0</span>';
  const up=v>0; return '<span class="delta '+(up?'up':'dn')+'">'+(up?'тЦ▓':'тЦ╝')+fmt(Math.abs(v))+'</span>';}
function modCols(){ // header cells for selected modules
  return state.mods.map(m=>'<th data-sk="m:'+m+'">'+MOD[m].label+' '+state.tf+'d</th>').join('');}
function modCells(met){ // value+delta cells for an entity's metrics object
  return state.mods.map(m=>'<td><div>'+fmt(met[m])+'</div><div class="sub2">'+deltaCell(met['d'+m])+'</div></td>').join('');}
function sortVal(met,meta,key){
  if(key==='name') return (meta.c||meta.n||'').toLowerCase();
  if(key==='acv') return meta.acv||0;
  if(key==='nu') return meta.nu||0;
  const [k,m]=key.split(':'); return k==='m'?met[m]:met['d'+m];
}

// ---- Organizations ----
function renderOrgs(){
  const M=metrics().org;
  let idx=D.orgs.map((o,i)=>i);
  if(state.owner!=='ALL') idx=idx.filter(i=>D.orgs[i].o===state.owner);
  const q=document.getElementById('orgSearch').value.trim().toLowerCase();
  if(q) idx=idx.filter(i=>D.orgs[i].c.toLowerCase().includes(q)||D.orgs[i].o.toLowerCase().includes(q));
  const s=state.orgSort, str=(s.key==='name');
  idx.sort((a,b)=>{const va=sortVal(M[a],D.orgs[a],s.key), vb=sortVal(M[b],D.orgs[b],s.key);
    return str ? s.dir*String(va).localeCompare(vb) : s.dir*(va-vb);});
  document.getElementById('orgCountPill').textContent=idx.length+(idx.length===1?' org':' orgs');
  const head='<thead><tr><th class="l" data-sk="name">Organization</th><th class="l">Owner</th>'+
    '<th data-sk="acv">ACV</th>'+modCols()+'<th data-sk="nu">Users</th></tr></thead>';
  const view=idx.slice(0,orgShow);
  let body=view.map(i=>{const o=D.orgs[i],m=M[i];
    return '<tr data-org="'+o.c.replace(/"/g,'&quot;')+'"><td class="l cust">'+o.c+'</td>'+
      '<td class="l sub2">'+o.o+'</td><td>'+(o.acv?'$'+fmt(o.acv):'тАФ')+'</td>'+modCells(m)+'<td>'+fmt(o.nu)+'</td></tr>';}).join('');
  if(!view.length) body='<tr><td class="l sub2" colspan="'+(4+state.mods.length)+'">No organizations in this view.</td></tr>';
  if(idx.length>orgShow) body+='<tr class="more"><td colspan="'+(4+state.mods.length)+'" style="text-align:center;padding:12px"><button class="loadmore" data-t="org">Load more ┬╖ showing '+view.length+' of '+idx.length+'</button></td></tr>';
  const tbl=document.getElementById('orgTable'); tbl.innerHTML=head+'<tbody>'+body+'</tbody>';
  wireHeaders(tbl,state.orgSort,renderOrgs);
  tbl.querySelectorAll('tr[data-org]').forEach(tr=>tr.onclick=()=>openOrg(tr.dataset.org));
  tbl.querySelectorAll('.loadmore').forEach(b=>b.onclick=()=>{orgShow+=PAGE;renderOrgs();});
}

// ---- Users ----
function renderUsers(){
  const M=metrics().user;
  let idx=D.users.map((u,i)=>i);
  if(state.owner!=='ALL') idx=idx.filter(i=>D.users[i].o===state.owner);
  const q=document.getElementById('userSearch').value.trim().toLowerCase();
  if(q) idx=idx.filter(i=>{const u=D.users[i];return (u.n||'').toLowerCase().includes(q)||u.e.toLowerCase().includes(q)||u.c.toLowerCase().includes(q);});
  const s=state.userSort, str=(s.key==='name');
  idx.sort((a,b)=>{const va=sortVal(M[a],D.users[a],s.key), vb=sortVal(M[b],D.users[b],s.key);
    return str ? s.dir*String(va).localeCompare(vb) : s.dir*(va-vb);});
  document.getElementById('userCountPill').textContent=idx.length+(idx.length===1?' user':' users');
  const head='<thead><tr><th class="l" data-sk="name">User</th><th class="l">Organization</th><th class="l">Owner</th>'+modCols()+'</tr></thead>';
  const view=idx.slice(0,userShow);
  let body=view.map(i=>{const u=D.users[i],m=M[i];
    return '<tr><td class="l"><div class="cust">'+(u.n||'(unknown)')+'</div><div class="sub2">'+u.e+'</div></td>'+
      '<td class="l sub2">'+u.c+'</td><td class="l sub2">'+u.o+'</td>'+modCells(m)+'</tr>';}).join('');
  if(!view.length) body='<tr><td class="l sub2" colspan="'+(3+state.mods.length)+'">No users in this view.</td></tr>';
  if(idx.length>userShow) body+='<tr class="more"><td colspan="'+(3+state.mods.length)+'" style="text-align:center;padding:12px"><button class="loadmore" data-t="user">Load more ┬╖ showing '+view.length+' of '+idx.length+'</button></td></tr>';
  const tbl=document.getElementById('userTable'); tbl.innerHTML=head+'<tbody>'+body+'</tbody>';
  wireHeaders(tbl,state.userSort,renderUsers);
  tbl.querySelectorAll('.loadmore').forEach(b=>b.onclick=()=>{userShow+=PAGE;renderUsers();});
}

function wireHeaders(tbl,s,rerender){
  tbl.querySelectorAll('th[data-sk]').forEach(th=>{
    if(th.dataset.sk===s.key) th.classList.add('sortcol');
    th.onclick=()=>{const k=th.dataset.sk; if(s.key===k)s.dir=-s.dir; else {s.key=k; s.dir=(k==='name')?1:-1;} buildSortUI(); rerender();};
  });
}

// ---- Org drill-in ----
function openOrg(name){
  const oi=D.orgs.findIndex(x=>x.c===name); if(oi<0)return; const o=D.orgs[oi]; state.ovOrg=name;
  const M=metrics().org[oi];
  document.getElementById('ovName').textContent=o.c;
  let stat='<div class="ostat">'+state.mods.map(m=>'<div><div class="l">'+MOD[m].full+' '+state.tf+'d</div><div class="v">'+fmt(M[m])+'</div>'+
    '<div class="sub2">'+deltaCell(M['d'+m])+' vs prior</div></div>').join('')+'</div>'+
    '<div class="ostat"><div><div class="l">Owner</div><div class="v" style="font-size:14px">'+o.o+'</div></div>'+
    '<div><div class="l">ACV</div><div class="v">'+(o.acv?'$'+fmt(o.acv):'тАФ')+'</div></div>'+
    '<div><div class="l">Active users</div><div class="v">'+fmt(o.nu)+'</div></div></div>';
  const UM=metrics().user;
  let us=D.users.map((u,i)=>i).filter(i=>D.users[i].c===name);
  const pm=state.mods[0];
  us.sort((a,b)=>UM[b][pm]-UM[a][pm]);
  let tbl='';
  if(us.length){
    tbl='<h2 style="padding:0;margin:4px 0 8px;font-size:13px">Users <span class="pill">'+us.length+' shown</span></h2>'+
      '<div class="t-scroll" style="max-height:none"><table><thead><tr><th class="l">User</th>'+
      state.mods.map(m=>'<th>'+MOD[m].label+'</th>').join('')+'</tr></thead><tbody>'+
      us.map(i=>{const u=D.users[i],m=UM[i];return '<tr style="cursor:default"><td class="l"><div class="cust">'+(u.n||'(unknown)')+'</div><div class="sub2">'+u.e+'</div></td>'+
        state.mods.map(md=>'<td>'+fmt(m[md])+'<div class="sub2">'+deltaCell(m['d'+md])+'</div></td>').join('')+'</tr>';}).join('')+'</tbody></table></div>';
  } else tbl='<p class="note">No users found for this organization in the current data file. Run refresh_usage_data.py to populate the full user set.</p>';
  document.getElementById('ovBody').innerHTML=stat+tbl;
  document.getElementById('over').classList.add('show'); document.getElementById('scrim').classList.add('show');
}
function closeOver(){document.getElementById('over').classList.remove('show');document.getElementById('scrim').classList.remove('show');state.ovOrg=null;}
document.getElementById('ovX').onclick=closeOver; document.getElementById('scrim').onclick=closeOver;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOver();});
document.getElementById('orgSearch').oninput=()=>{orgShow=PAGE;renderOrgs();};
document.getElementById('userSearch').oninput=()=>{userShow=PAGE;renderUsers();};

// trial toggle availability + footer
function syncTrial(){const w=document.getElementById('trialWrap');
  if(state.owner==='ALL'){w.classList.remove('dis');} else {w.classList.add('dis');document.getElementById('trialChk').checked=false;state.trial=false;}}
document.getElementById('foot').innerHTML=
  '<b>Source:</b> CrateDB <code>analytics</code> schema, loaded from <code>usage_data.js</code>. Tables, leaderboard, and KPIs recompute for the selected <b>time frame</b> '+
  'using weekly buckets (7d тЙИ latest week, 30d тЙИ last 4 weeks, 90d = full window). <b>Rank by тЖТ movement (╬Ф hits)</b> orders accounts by how much activity rose or fell, so '+
  '<b>Biggest increase</b> surfaces the fastest-growing accounts and <b>Biggest decrease</b> the fastest-declining, per module. Movement compares the current window to the equal '+
  'period just before it (7d, 30d); for 90d there is no prior 90-day window, so it compares the recent half of the window to the earlier half. <b>Total hits</b> ranks by raw volume instead. '+
  '<b>Core</b> is an export-weighted score, so single-day spikes can be one-off exports тАФ the 7-day average is the truer trend. '+
  'User-level figures cover provisioned external users only (~2тАУ3% below org-level by design). Module mix is 30-day rolling at org level. Owner trends/totals are exact across all paying orgs.';

function render(){syncTrial();renderKpis();renderTrend();renderMix();renderLb();renderOrgs();renderUsers();}
buildSortUI();
render();
</script>
