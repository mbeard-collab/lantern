[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[edge_functions]]
  function = "generate"
  path = "/api/generate"

# Password gate for the private dashboard space (PRIVATE_PASSWORD env var).
[[edge_functions]]
  function = "private-gate"
  path = "/private/*"

[[redirects]]
  from = "/private"
  to = "/private/"
  status = 301

[[redirects]]
  from = "/api/commit"
  to = "/.netlify/functions/commit"
  status = 200

[[redirects]]
  from = "/api/voting/*"
  to = "/.netlify/functions/voting/:splat"
  status = 200

# Voting ballots use a single template at /voting/_template/ — the URL stays
# /voting/<pollId>/ so relative fetches (./items.json) resolve per-poll.
[[redirects]]
  from = "/voting/:pollId/results.html"
  to = "/voting/_template/results.html"
  status = 200

[[redirects]]
  from = "/voting/:pollId/"
  to = "/voting/_template/ballot.html"
  status = 200

[dev]
  framework = "#static"
