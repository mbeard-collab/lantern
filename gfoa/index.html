.filter-row{display:grid;grid-template-columns:repeat(6,1fr);gap:8px}

function exportCSV(){var filtered=getFiltered();if(!filtered.length){showToast("No rows to export");return;}var headers=["Company","Owner","ICP Tier","Status","Industry","Booth","Website","Open Opps","In Salesforce","Salesforce URL","Contact Count"],rows=filtered.map(function(r){return [r.name,r.owner,r.icp,r.status,r.industry,r.booth,r.website,r.openOpps,r.inSF?"Yes":"No",r.sfUrl,(r.contacts||[]).length].map(esc).join(",");});var csv=[headers.map(esc).join(",")].concat(rows).join("\r\n"),blob=new Blob([csv],{type:"text/csv"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download="GFOA2026_"+filtered.length+"accts.csv";a.click();URL.revokeObjectURL(url);showToast(filtered.length+" rows exported");}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}
